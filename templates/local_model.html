<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>本地模型 - 中控</title>
  <link rel="stylesheet" href="/static/css/views/local-model.css?v=20260602-local-model-redesign-v1">
</head>
<body class="local-model-standalone">
  <div class="local-model-standalone-layout">
    <aside class="local-model-standalone-sidebar">
      <div class="local-model-standalone-logo">演播中控</div>
      <ul class="local-model-standalone-nav">
        {% for item in (config.sidebar|sort(attribute='sort') if config.sidebar else []) %}
          {% if item.visible %}
          <li class="{{ 'active' if item.id == 'local_model' else '' }}">
            <a href="{{ '/current-collector' if item.id == 'current_collector' else ('/local-model' if item.id == 'local_model' else ('/m32r' if item.id == 'm32r' else '/?view=' ~ item.id)) }}">
              <span class="nav-icon">{{ item.icon }}</span>
              <span class="nav-label">{{ item.name }}</span>
            </a>
          </li>
          {% endif %}
        {% endfor %}
      </ul>
      <div class="local-model-standalone-sys">Smart Center<br>本地模型</div>
    </aside>
    <div class="local-model-standalone-content">
      <header class="local-model-standalone-header">
        <div>
          <h1>本地模型</h1>
          <div class="local-model-standalone-meta"><a href="/">返回中控主页</a> · 飞书自然语言理解与执行记录</div>
        </div>
      </header>
      <main class="local-model-standalone-main">
        <div id="view-local_model"></div>
      </main>
    </div>
  </div>
  <script src="/static/js/views/local-model.js?v=20260602-local-model-redesign-v1"></script>
</body>
</html>
