<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驱动中心</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #142036;
            --line: #24324b;
            --text: #e5edf9;
            --sub: #99a9c4;
            --ok: #22c55e;
            --bad: #ef4444;
            --btn: #3b82f6;
        }
        * { box-sizing: border-box; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 18px; }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }
        .toolbar input {
            background: #0f1b31;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            min-width: 220px;
        }
        .toolbar button {
            border: 0;
            border-radius: 8px;
            padding: 8px 14px;
            color: #fff;
            background: var(--btn);
            cursor: pointer;
            font-weight: 600;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
        }
        .k { color: var(--sub); font-size: 12px; }
        .v { font-size: 24px; font-weight: 700; margin-top: 6px; }
        .v.ok { color: var(--ok); }
        .v.bad { color: var(--bad); }
        table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
        th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; font-size: 13px; text-align: left; vertical-align: top; }
        th { color: var(--sub); font-weight: 700; background: #0f1b31; }
        tr:hover td { background: rgba(59, 130, 246, 0.08); }
        .status { font-weight: 700; }
        .status.ok { color: var(--ok); }
        .status.bad { color: var(--bad); }
        .mono { font-family: Consolas, "Courier New", monospace; }
        .json-cell {
            max-width: 480px;
            max-height: 180px;
            overflow: auto;
            white-space: pre-wrap;
            background: #0b162a;
            border: 1px solid #22314d;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
        }
        .hint { color: var(--sub); font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="toolbar">
        <button onclick="reloadAll()">刷新</button>
        <input id="groupsInput" placeholder="按组过滤，例如 power,meter,light" />
        <button onclick="applyFilter()">应用过滤</button>
        <button onclick="clearFilter()">清空过滤</button>
    </div>

    <div class="metrics">
        <div class="card"><div class="k">驱动总数</div><div id="totalDrivers" class="v">0</div></div>
        <div class="card"><div class="k">在线驱动</div><div id="onlineDrivers" class="v ok">0</div></div>
        <div class="card"><div class="k">离线驱动</div><div id="offlineDrivers" class="v bad">0</div></div>
        <div class="card"><div class="k">最近更新时间</div><div id="updatedAt" class="v mono" style="font-size:14px;">--</div></div>
    </div>

    <table>
        <thead>
        <tr>
            <th>驱动ID</th>
            <th>分组</th>
            <th>名称</th>
            <th>协议</th>
            <th>通讯</th>
            <th>状态</th>
            <th>错误</th>
            <th>数据</th>
        </tr>
        </thead>
        <tbody id="driverBody">
        <tr><td colspan="8">加载中...</td></tr>
        </tbody>
    </table>
    <div class="hint">页面通过 /api/driver_hub/snapshot 读取驱动数据，可直接给 Node-RED 的 HTTP In/Request 节点复用。</div>
</div>

<script>
let currentGroups = '';

function esc(text) {
    return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
}

function renderRows(items) {
    const body = document.getElementById('driverBody');
    if (!Array.isArray(items) || !items.length) {
        body.innerHTML = '<tr><td colspan="8">无数据</td></tr>';
        return;
    }
    body.innerHTML = items.map(item => {
        const statusCls = item.online ? 'ok' : 'bad';
        const statusText = item.online ? '在线' : '离线';
        const err = item.error || '';
        const dataText = JSON.stringify(item.data || {}, null, 2);
        return `<tr>
            <td class="mono">${esc(item.driver_id)}</td>
            <td>${esc(item.group)}</td>
            <td>${esc(item.name)}</td>
            <td>${esc(item.protocol)}</td>
            <td>${esc(item.comm_mode)}</td>
            <td><span class="status ${statusCls}">${statusText}</span></td>
            <td>${esc(err)}</td>
            <td><pre class="json-cell mono">${esc(dataText)}</pre></td>
        </tr>`;
    }).join('');
}

async function reloadAll() {
    const url = currentGroups ? `/api/driver_hub/snapshot?groups=${encodeURIComponent(currentGroups)}` : '/api/driver_hub/snapshot';
    const resp = await fetch(url);
    const data = await resp.json();
    document.getElementById('totalDrivers').innerText = data.total_drivers || 0;
    document.getElementById('onlineDrivers').innerText = data.online_drivers || 0;
    document.getElementById('offlineDrivers').innerText = data.offline_drivers || 0;
    document.getElementById('updatedAt').innerText = data.generated_at || '--';
    renderRows(data.drivers || []);
}

function applyFilter() {
    const value = document.getElementById('groupsInput').value.trim();
    currentGroups = value;
    reloadAll();
}

function clearFilter() {
    document.getElementById('groupsInput').value = '';
    currentGroups = '';
    reloadAll();
}

reloadAll();
setInterval(reloadAll, 4000);
</script>
</body>
</html>
