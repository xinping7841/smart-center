<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驱动中心</title>
    <link rel="stylesheet" href="/static/css/views/driver-hub.css">
</head>
<body>
<div class="wrap">
    <div class="toolbar">
        <button onclick="reloadAll()">刷新</button>
        <input id="groupsInput" placeholder="按组过滤，例如 power,meter,light" />
        <button onclick="applyFilter()">应用过滤</button>
        <button onclick="clearFilter()">清空过滤</button>
    </div>

    <div class="metrics">
        <div class="card"><div class="k">驱动总数</div><div id="totalDrivers" class="v">0</div></div>
        <div class="card"><div class="k">在线驱动</div><div id="onlineDrivers" class="v ok">0</div></div>
        <div class="card"><div class="k">离线驱动</div><div id="offlineDrivers" class="v bad">0</div></div>
        <div class="card"><div class="k">最近更新时间</div><div id="updatedAt" class="v mono" style="font-size:14px;">--</div></div>
    </div>

    <table>
        <thead>
        <tr>
            <th>驱动ID</th>
            <th>分组</th>
            <th>名称</th>
            <th>协议</th>
            <th>通讯</th>
            <th>状态</th>
            <th>错误</th>
            <th>数据</th>
        </tr>
        </thead>
        <tbody id="driverBody">
        <tr><td colspan="8">加载中...</td></tr>
        </tbody>
    </table>
    <div class="hint">页面通过 /api/driver_hub/snapshot 读取驱动数据，可直接给 Node-RED 的 HTTP In/Request 节点复用。</div>
</div>

<script src="/static/js/views/driver-hub.js?v=20260522-stage2-driver-hub-view"></script>
</body>
</html>
