source_root: /srv/git-work/smart-center-main
notes:
  - Keep this index small and current. It is used by local AI before broad search.
  - Runtime backups and generated files are not source of truth.
modules:
  core_frontend:
    purpose: Shared frontend namespace, module registry, API wrappers, permissions, formatting, toast, and frontend error guards.
    routes: []
    backend: []
    frontend: ['static/js/core/viewport-layout.js','static/js/core/bootstrap.js','static/js/core/utils.js']
    config_keys: []
    runtime_state: []
    split_priority: low
    ai_keywords: ['frontend core','SmartCenter','utils','toast','fetchJson','permission','module registry','viewport','layout preset','mobile desktop']
  dashboard:
    purpose: Main overview page and summary cards.
    routes: ['/','/api/dashboard/summary']
    backend: ['api/power.py','api/dashboard.py']
    frontend: ['templates/index.html','static/css/views/dashboard-inline.css']
    config_keys: ['dashboard','ui_text']
    split_priority: high
    ai_keywords: ['dashboard','summary','home','overview']
  auth_login:
    frontend_module: 'static/js/views/login.js'
    purpose: Login page submit handler, remember-me local storage, and auth redirect.
    routes: ['/login','/api/auth/login']
    backend: ['api/auth_api.py']
    frontend: ['templates/login.html','static/js/views/login.js']
    config_keys: ['login_page_text','auth']
    runtime_state: ['runtime/auth_users.json']
    split_priority: low
    ai_keywords: ['login','auth','remember me','permission','account']
