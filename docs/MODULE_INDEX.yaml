    frontend: ['templates/index.html','templates/config.html','static/js/views/power-meter.js']
    config_keys: ['cabinets','meter_service','meter_statistics','cabinet_gateway']
    runtime_state: ['DEVICE_STATUS','METER_STATUS','runtime/remote_meter_payload_cache.json']
    split_priority: very_high
    ai_keywords: ['power','meter','cabinet','energy','current','channel']
